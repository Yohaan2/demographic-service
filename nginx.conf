user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # Basic performance tuning optimized for high-throughput media files
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    server_tokens off; # Security: Hide Nginx version

    # Client body and buffer sizes (Allow up to 10MB images uploads)
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # Gzip Compression configuration to save bandwidth on JSON and assets
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rate Limiting: 10 requests/sec per IP, burst pool of 20 requests
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Backend upstream with keepalive connection pool to prevent socket exhaustion
    upstream backend_api {
        server backend:8000;
        keepalive 32;
    }

    server {
        listen       80;
        server_name  localhost;

        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src 'self' http://localhost:8000 http://localhost http://127.0.0.1:8000 http://127.0.0.1;" always;

        # Frontend: Proxy to the backend since the backend serves the compiled static files
        location / {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            
            # Keepalive header mapping
            proxy_set_header Connection "";
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Robust timeouts to support slightly slower pipeline operations safely
            proxy_connect_timeout 15s;
            proxy_read_timeout    120s;
            proxy_send_timeout    120s;
        }

        # Backend API proxy
        location /api/ {
            # Apply rate limiting to secure the machine
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            
            # Keepalive header mapping
            proxy_set_header Connection "";
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Robust timeouts to support slightly slower pipeline operations safely
            proxy_connect_timeout 15s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }

        # Prometheus telemetry scrape proxy
        location /metrics {
            proxy_pass http://backend_api/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            
            # Restrict metrics access only to internal network or local loopback in real setups
            # allow 127.0.0.1;
            # deny all;
        }

        # Healthcheck endpoint proxy
        location /health {
            proxy_pass http://backend_api/health;
            proxy_http_version 1.1;
        }

        # Redirect server error pages to the static page /50x.html
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
